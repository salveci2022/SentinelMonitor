<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPYNET - Dashboard</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100%;
            background: linear-gradient(180deg, #0a0a1a 0%, #0d0d1a 100%);
            border-right: 1px solid rgba(0, 255, 255, 0.2);
            padding: 20px 0;
        }

        .logo-sidebar {
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            margin-bottom: 20px;
        }

        .logo-sidebar img {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .logo-sidebar h2 {
            color: #00ffff;
            font-size: 18px;
        }

        .logo-sidebar p {
            color: #666;
            font-size: 10px;
        }

        .nav-item {
            padding: 12px 24px;
            color: #ccc;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background: rgba(0, 255, 255, 0.1);
            color: #00ffff;
        }

        .nav-item.active {
            background: rgba(0, 255, 255, 0.15);
            border-left-color: #00ffff;
            color: #00ffff;
        }

        .main-content {
            margin-left: 260px;
            padding: 20px;
        }

        .header {
            background: rgba(10, 10, 26, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        .header h1 {
            color: #00ffff;
            font-size: 24px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info span {
            color: #ccc;
        }

        .btn-sair {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid #ff4444;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(10, 10, 26, 0.9);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            text-align: center;
        }

        .card .number {
            color: #00ffff;
            font-size: 36px;
            font-weight: bold;
        }

        .card h3 {
            color: #888;
            font-size: 14px;
            margin-top: 10px;
        }

        .table-container {
            background: rgba(10, 10, 26, 0.9);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        .table-container h2 {
            color: #00ffff;
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: #ccc;
        }

        th {
            color: #00ffff;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
            }
            .logo-sidebar h2, .logo-sidebar p, .nav-item span:last-child {
                display: none;
            }
            .main-content {
                margin-left: 70px;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-sidebar">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="SPYNET">
            <h2>SPYNET</h2>
            <p>SEGURANÇA</p>
        </div>
        <div class="nav-item active" onclick="window.location.href='/dashboard'">
            <span>🏠</span>
            <span>Dashboard</span>
        </div>
        <div class="nav-item" onclick="window.location.href='/sentinel'">
            <span>🛡️</span>
            <span>Sentinel Monitor</span>
        </div>
        <div class="nav-item" onclick="window.location.href='/osint'">
            <span>🔍</span>
            <span>OSINT</span>
        </div>
        <div class="nav-item" onclick="window.location.href='/casos'">
            <span>📋</span>
            <span>Casos</span>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Dashboard</h1>
            <div class="user-info">
                <span>👤 Spynet2026</span>
                <button class="btn-sair" onclick="window.location.href='/sair'">Sair</button>
            </div>
        </div>

        <div class="cards-container">
            <div class="card">
                <div class="number" id="totalCasos">0</div>
                <h3>Total de Casos</h3>
            </div>
            <div class="card">
                <div class="number" id="casosAndamento">0</div>
                <h3>Em Andamento</h3>
            </div>
            <div class="card">
                <div class="number" id="casosConcluidos">0</div>
                <h3>Concluídos</h3>
            </div>
            <div class="card">
                <div class="number" id="alertasPrioridade">0</div>
                <h3>Alertas</h3>
            </div>
        </div>

        <div class="table-container">
            <h2>Últimas Atividades</h2>
            <table>
                <thead>
                    <tr><th>Data</th><th>Atividade</th><th>Status</th></tr>
                </thead>
                <tbody>
                    <tr><td>-</td><td>Sistema Online</td><td>✅ Ativo</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function carregarEstatisticas() {
            try {
                const response = await fetch('/api/estatisticas');
                const data = await response.json();
                document.getElementById('totalCasos').textContent = data.total;
                document.getElementById('casosAndamento').textContent = data.em_andamento;
                document.getElementById('casosConcluidos').textContent = data.concluidos;
                document.getElementById('alertasPrioridade').textContent = data.prioridade_alta;
            } catch(e) {}
        }
        carregarEstatisticas();
    </script>
</body>
</html>
