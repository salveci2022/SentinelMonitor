<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPYNET - Dashboard</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a0a; min-height: 100vh; }
        .sidebar { position: fixed; left: 0; top: 0; width: 260px; height: 100%; background: linear-gradient(180deg, #0a0a1a 0%, #0d0d1a 100%); border-right: 1px solid rgba(0,255,255,0.2); padding: 20px 0; }
        .logo-sidebar { text-align: center; padding: 20px; border-bottom: 1px solid rgba(0,255,255,0.2); margin-bottom: 20px; }
        .logo-sidebar img { width: 60px; height: 60px; border-radius: 12px; margin-bottom: 10px; }
        .logo-sidebar h2 { color: #00ffff; font-size: 18px; }
        .logo-sidebar p { color: #666; font-size: 10px; }
        .nav-item { padding: 12px 24px; color: #ccc; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 12px; border-left: 3px solid transparent; }
        .nav-item:hover { background: rgba(0,255,255,0.1); color: #00ffff; }
        .nav-item.active { background: rgba(0,255,255,0.15); border-left-color: #00ffff; color: #00ffff; }
        .main-content { margin-left: 260px; padding: 20px; }
        .header { background: rgba(10,10,26,0.9); backdrop-filter: blur(10px); border-radius: 15px; padding: 15px 25px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(0,255,255,0.2); flex-wrap: wrap; gap: 10px; }
        .header h1 { color: #00ffff; font-size: 24px; }
        .header h1 small { font-size: 12px; color: #888; }
        .user-info { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .user-info span { color: #ccc; }
        .btn-sair { background: rgba(255,68,68,0.2); color: #ff4444; border: 1px solid #ff4444; padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .btn-sair:hover { background: #ff4444; color: white; }
        .btn-pdf { background: rgba(0,170,255,0.2); color: #00aaff; border: 1px solid #00aaff; padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .btn-pdf:hover { background: #00aaff; color: white; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: linear-gradient(135deg, rgba(10,10,26,0.95), rgba(0,20,40,0.9)); border-radius: 15px; padding: 20px; border: 1px solid rgba(0,255,255,0.2); text-align: center; transition: all 0.3s; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,255,255,0.1); }
        .stat-card .icon { font-size: 35px; margin-bottom: 10px; }
        .stat-card .value { font-size: 32px; font-weight: bold; color: #00ffff; }
        .stat-card .label { color: #888; font-size: 12px; margin-top: 5px; }
        .ia-panel { background: linear-gradient(135deg, rgba(0,50,80,0.6), rgba(0,20,40,0.8)); border-radius: 15px; padding: 20px; border: 1px solid rgba(0,255,255,0.3); margin-bottom: 30px; }
        .ia-panel h3 { color: #00ffff; display: flex; align-items: center; gap: 10px; }
        .ia-message { color: #ccc; line-height: 1.6; margin-top: 10px; }
        .panel { background: rgba(10,10,26,0.9); border-radius: 15px; padding: 20px; border: 1px solid rgba(0,255,255,0.2); }
        .panel h3 { color: #00ffff; margin-bottom: 15px; }
        .caso-item { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
        .empty-state { text-align: center; padding: 30px; color: #666; }
        @media (max-width: 1024px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { .sidebar { width: 70px; } .logo-sidebar h2, .logo-sidebar p, .nav-item span:last-child { display: none; } .main-content { margin-left: 70px; } .stats-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-sidebar">
            <img src="/static/logo.png" alt="SPYNET" onerror="this.src='https://placehold.co/60x60/0a0a1a/00ffff?text=SN'">
            <h2>SPYNET</h2>
            <p>INTELLIGENCE</p>
        </div>
        <div class="nav-item active" onclick="window.location.href='/dashboard'"><span>🏠</span><span>Dashboard</span></div>
        <div class="nav-item" onclick="window.location.href='/sentinel'"><span>🛡️</span><span>Sentinel Monitor</span></div>
        <div class="nav-item" onclick="window.location.href='/osint'"><span>🔍</span><span>OSINT</span></div>
        <div class="nav-item" onclick="window.location.href='/casos'"><span>📋</span><span>Casos</span></div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Intelligence Dashboard <small>Powered by IA</small></h1>
            <div class="user-info">
                <span>👤 {{ usuario }}</span>
                <button class="btn-pdf" id="btnPDF">📄 EXPORTAR RELATÓRIO</button>
                <button class="btn-sair" onclick="window.location.href='/sair'">Sair</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="icon">📊</div><div class="value" id="totalCasos">—</div><div class="label">Total de Casos</div></div>
            <div class="stat-card"><div class="icon">⚡</div><div class="value" id="casosAndamento">—</div><div class="label">Em Andamento</div></div>
            <div class="stat-card"><div class="icon">✅</div><div class="value" id="casosConcluidos">—</div><div class="label">Concluídos</div></div>
            <div class="stat-card"><div class="icon">🚨</div><div class="value" id="alertasPrioridade">—</div><div class="label">Alertas Prioritários</div></div>
        </div>

        <div class="ia-panel">
            <h3>🧠 IA Intelligence Insights</h3>
            <div class="ia-message" id="iaMessage">Carregando dados do sistema...</div>
        </div>

        <div class="panel">
            <h3>📋 Últimos Casos</h3>
            <div id="ultimosCasos"><div class="empty-state">Carregando...</div></div>
        </div>
    </div>

    <script>
        async function carregarDados() {
            try {
                const res = await fetch('/api/estatisticas');
                const stats = await res.json();
                document.getElementById('totalCasos').textContent = stats.total;
                document.getElementById('casosAndamento').textContent = stats.em_andamento;
                document.getElementById('casosConcluidos').textContent = stats.concluidos;
                document.getElementById('alertasPrioridade').textContent = stats.prioridade_alta;

                const msg = stats.total > 0
                    ? `🤖 Análise IA: ${stats.total} casos registrados. ${stats.prioridade_alta} casos requerem atenção prioritária. Sistema funcionando normalmente.`
                    : 'Sistema SPYNET online. Monitoramento ativo. Nenhum caso registrado ainda.';
                document.getElementById('iaMessage').textContent = msg;

                const casosRes = await fetch('/api/casos');
                const casos = await casosRes.json();
                const ultimosDiv = document.getElementById('ultimosCasos');
                if (casos.length > 0) {
                    ultimosDiv.innerHTML = casos.slice(0, 5).map(c => `
                        <div class="caso-item">
                            <div><strong style="color:#ccc;">${c.nome}</strong><br><small style="color:#888;">${c.data_criacao}</small></div>
                            <span style="color:${c.status === 'em_andamento' ? '#ffaa00' : '#00ff00'}">${c.status === 'em_andamento' ? 'Em andamento' : 'Concluído'}</span>
                        </div>
                    `).join('');
                } else {
                    ultimosDiv.innerHTML = '<div class="empty-state">Nenhum caso registrado. Acesse o módulo Casos para criar.</div>';
                }
            } catch(e) {
                console.error('Erro ao carregar dados:', e);
            }
        }

        document.getElementById('btnPDF').onclick = async () => {
            const now = new Date();
            const total = document.getElementById('totalCasos').textContent;
            const andamento = document.getElementById('casosAndamento').textContent;
            const concluidos = document.getElementById('casosConcluidos').textContent;
            const alertas = document.getElementById('alertasPrioridade').textContent;
            const iaMsg = document.getElementById('iaMessage').innerText;

            const conteudo = `SPYNET - DASHBOARD REPORT
Data: ${now.toLocaleString()}
Sistema: SPYNET Intelligence v2.0

ESTATÍSTICAS
Total de Casos: ${total}
Em Andamento: ${andamento}
Concluídos: ${concluidos}
Alertas Prioritários: ${alertas}

ANÁLISE IA
${iaMsg}

© 2026 SPYNET Security`;

            const blob = new Blob([conteudo], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `spynet_dashboard_${now.toISOString().slice(0,10)}.txt`;
            link.click();
        };

        carregarDados();
        setInterval(carregarDados, 10000);
    </script>
</body>
</html>
