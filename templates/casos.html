<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPYNET - Casos</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a0a; min-height: 100vh; }
        .sidebar { position: fixed; left: 0; top: 0; width: 270px; height: 100%; background: linear-gradient(180deg, #0a0a1a 0%, #0d0d1a 100%); border-right: 1px solid rgba(0,255,255,0.2); padding: 20px 0; }
        .logo-sidebar { text-align: center; padding: 20px; border-bottom: 1px solid rgba(0,255,255,0.2); margin-bottom: 20px; }
        .logo-sidebar img { width: 65px; height: 65px; border-radius: 15px; }
        .logo-sidebar h2 { color: #00ffff; font-size: 20px; }
        .nav-item { padding: 14px 24px; color: #ccc; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 12px; border-left: 3px solid transparent; }
        .nav-item:hover { background: rgba(0,255,255,0.1); color: #00ffff; }
        .nav-item.active { background: rgba(0,255,255,0.15); border-left-color: #00ffff; color: #00ffff; }
        .main-content { margin-left: 270px; padding: 20px; }
        .header { background: rgba(10,10,26,0.9); border-radius: 15px; padding: 15px 25px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(0,255,255,0.2); }
        .header h1 { color: #00ffff; font-size: 24px; }
        .btn-sair { background: rgba(255,68,68,0.2); color: #ff4444; border: 1px solid #ff4444; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: rgba(10,10,26,0.9); border-radius: 15px; padding: 20px; text-align: center; border: 1px solid rgba(0,255,255,0.2); }
        .stat-card .value { font-size: 32px; font-weight: bold; color: #00ffff; }
        .stat-card .label { color: #888; font-size: 12px; margin-top: 5px; }
        .btn-criar { background: linear-gradient(135deg, #00aaff, #0066cc); color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }
        .filtros { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .filtro-btn { padding: 8px 20px; background: rgba(30,30,50,0.8); border: 1px solid #333; border-radius: 25px; color: #ccc; cursor: pointer; }
        .filtro-btn.active { background: #00aaff; color: white; border-color: #00aaff; }
        .caso-card { background: rgba(10,10,26,0.9); border-radius: 15px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(0,255,255,0.2); transition: 0.3s; border-left: 3px solid transparent; }
        .caso-card:hover { transform: translateX(5px); border-left-color: #00ffff; }
        .caso-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .caso-titulo { color: #00ffff; font-size: 18px; }
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; }
        .status-em_andamento { background: rgba(255,170,0,0.2); color: #ffaa00; }
        .status-concluido { background: rgba(0,255,0,0.15); color: #00ff00; }
        .prioridade-alta { background: rgba(255,68,68,0.2); color: #ff4444; padding: 3px 10px; border-radius: 15px; font-size: 11px; }
        .caso-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 15px 0; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 10px; color: #ccc; font-size: 14px; }
        .empty { text-align: center; padding: 60px; color: #666; }
        .btn-concluir { background: rgba(0,255,0,0.15); color: #0f0; border: 1px solid #0f0; padding: 8px 16px; border-radius: 8px; cursor: pointer; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 999; justify-content: center; align-items: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: #0d0d1a; border: 1px solid rgba(0,255,255,0.3); border-radius: 20px; padding: 30px; width: 100%; max-width: 500px; }
        .modal h3 { color: #00ffff; margin-bottom: 20px; }
        .modal label { display: block; color: #00ffff; font-size: 12px; margin-bottom: 5px; margin-top: 15px; }
        .modal input, .modal select, .modal textarea { width: 100%; padding: 10px 14px; background: rgba(20,20,40,0.8); border: 1px solid #333; border-radius: 10px; color: #fff; font-size: 14px; }
        .modal textarea { height: 80px; resize: vertical; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn-salvar { flex: 1; padding: 12px; background: linear-gradient(135deg, #00aaff, #0066cc); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-cancelar { flex: 1; padding: 12px; background: rgba(255,68,68,0.2); color: #ff4444; border: 1px solid #ff4444; border-radius: 10px; cursor: pointer; }

        @media (max-width: 768px) { .sidebar { width: 70px; } .logo-sidebar h2, .nav-item span:last-child { display: none; } .main-content { margin-left: 70px; } .stats-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-sidebar">
            <img src="/static/logo.png" alt="SPYNET" onerror="this.src='https://placehold.co/65x65/0a0a1a/00ffff?text=SN'">
            <h2>SPYNET</h2>
        </div>
        <div class="nav-item" onclick="window.location.href='/dashboard'"><span>🏠</span><span>Dashboard</span></div>
        <div class="nav-item" onclick="window.location.href='/sentinel'"><span>🛡️</span><span>Sentinel Monitor</span></div>
        <div class="nav-item" onclick="window.location.href='/osint'"><span>🔍</span><span>OSINT IA</span></div>
        <div class="nav-item active" onclick="window.location.href='/casos'"><span>📋</span><span>Casos</span></div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Casos Investigativos</h1>
            <button class="btn-sair" onclick="window.location.href='/sair'">Sair</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="value" id="totalCasos">—</div><div class="label">Total de Casos</div></div>
            <div class="stat-card"><div class="value" id="casosAndamento">—</div><div class="label">Em Andamento</div></div>
            <div class="stat-card"><div class="value" id="casosConcluidos">—</div><div class="label">Concluídos</div></div>
        </div>

        <button class="btn-criar" onclick="abrirModal()">+ NOVO CASO</button>

        <div class="filtros">
            <button class="filtro-btn active" data-filtro="todos">📋 Todos</button>
            <button class="filtro-btn" data-filtro="em_andamento">⚡ Em Andamento</button>
            <button class="filtro-btn" data-filtro="concluido">✅ Concluídos</button>
        </div>

        <div id="listaCasos"></div>
    </div>

    <!-- Modal Novo Caso -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3>📋 Novo Caso Investigativo</h3>
            <label>Título do Caso *</label>
            <input type="text" id="inputNome" placeholder="Ex: Investigação Caso 001">
            <label>Descrição</label>
            <textarea id="inputDescricao" placeholder="Descreva o caso..."></textarea>
            <label>Vítima</label>
            <input type="text" id="inputVitima" placeholder="Nome da vítima">
            <label>Suspeito</label>
            <input type="text" id="inputSuspeito" placeholder="Nome do suspeito">
            <label>Prioridade</label>
            <select id="inputPrioridade">
                <option value="media">Média</option>
                <option value="alta">Alta 🚨</option>
                <option value="baixa">Baixa</option>
            </select>
            <div class="modal-buttons">
                <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
                <button class="btn-salvar" onclick="salvarCaso()">💾 Salvar Caso</button>
            </div>
        </div>
    </div>

    <script>
        let todosCasos = [];
        let filtroAtual = 'todos';

        async function carregarCasos() {
            try {
                const res = await fetch('/api/casos');
                todosCasos = await res.json();
                renderizarLista();
                atualizarEstatisticas();
            } catch(e) {
                console.error('Erro ao carregar casos:', e);
            }
        }

        function atualizarEstatisticas() {
            document.getElementById('totalCasos').textContent = todosCasos.length;
            document.getElementById('casosAndamento').textContent = todosCasos.filter(c => c.status === 'em_andamento').length;
            document.getElementById('casosConcluidos').textContent = todosCasos.filter(c => c.status === 'concluido').length;
        }

        function renderizarLista() {
            let lista = todosCasos;
            if (filtroAtual !== 'todos') lista = todosCasos.filter(c => c.status === filtroAtual);

            const container = document.getElementById('listaCasos');
            if (lista.length === 0) {
                container.innerHTML = '<div class="empty">📋 Nenhum caso encontrado. Clique em "+ NOVO CASO" para começar.</div>';
                return;
            }
            container.innerHTML = lista.map(caso => `
                <div class="caso-card">
                    <div class="caso-header">
                        <div class="caso-titulo">${caso.nome}</div>
                        <div style="display:flex; gap:10px; align-items:center;">
                            ${caso.prioridade === 'alta' ? '<span class="prioridade-alta">🚨 Alta</span>' : ''}
                            <span class="status-badge status-${caso.status}">${caso.status === 'em_andamento' ? '⚡ Em Andamento' : '✅ Concluído'}</span>
                        </div>
                    </div>
                    <div class="caso-info">
                        <div>📝 ${caso.descricao}</div>
                        <div>👤 Vítima: ${caso.vitima}</div>
                        <div>👁️ Suspeito: ${caso.suspeito}</div>
                        <div>📅 ${caso.data_criacao}</div>
                    </div>
                    ${caso.status === 'em_andamento' ? `<button class="btn-concluir" onclick="concluirCaso(${caso.id})">✅ Concluir Caso</button>` : ''}
                </div>
            `).join('');
        }

        async function salvarCaso() {
            const nome = document.getElementById('inputNome').value.trim();
            if (!nome) { alert('Digite o título do caso.'); return; }

            const payload = {
                nome,
                descricao: document.getElementById('inputDescricao').value || 'Sem descrição',
                vitima: document.getElementById('inputVitima').value || 'Não informada',
                suspeito: document.getElementById('inputSuspeito').value || 'Não informado',
                prioridade: document.getElementById('inputPrioridade').value
            };

            try {
                await fetch('/api/casos', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
                fecharModal();
                carregarCasos();
            } catch(e) {
                alert('Erro ao salvar caso.');
            }
        }

        async function concluirCaso(id) {
            try {
                await fetch(`/api/casos/${id}/concluir`, { method: 'POST' });
                carregarCasos();
            } catch(e) {
                alert('Erro ao concluir caso.');
            }
        }

        function abrirModal() {
            document.getElementById('inputNome').value = '';
            document.getElementById('inputDescricao').value = '';
            document.getElementById('inputVitima').value = '';
            document.getElementById('inputSuspeito').value = '';
            document.getElementById('inputPrioridade').value = 'media';
            document.getElementById('modalOverlay').classList.add('show');
        }

        function fecharModal() {
            document.getElementById('modalOverlay').classList.remove('show');
        }

        document.querySelectorAll('.filtro-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                filtroAtual = btn.dataset.filtro;
                renderizarLista();
            });
        });

        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modalOverlay')) fecharModal();
        });

        carregarCasos();
    </script>
</body>
</html>
