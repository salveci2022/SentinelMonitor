<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPYNET - Casos Investigativos</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100%;
            background: linear-gradient(180deg, #0a0a1a 0%, #0d0d1a 100%);
            border-right: 1px solid rgba(0, 255, 255, 0.2);
            padding: 20px 0;
        }

        .logo-sidebar {
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            margin-bottom: 20px;
        }

        .logo-sidebar img {
            width: 70px;
            height: 70px;
            border-radius: 15px;
        }

        .logo-sidebar h2 {
            color: #00ffff;
            font-size: 20px;
        }

        .nav-item {
            padding: 14px 24px;
            color: #ccc;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background: rgba(0, 255, 255, 0.1);
            color: #00ffff;
        }

        .nav-item.active {
            background: rgba(0, 255, 255, 0.15);
            border-left-color: #00ffff;
            color: #00ffff;
        }

        .main-content {
            margin-left: 280px;
            padding: 20px;
        }

        .header {
            background: rgba(10, 10, 26, 0.9);
            border-radius: 15px;
            padding: 15px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        .header h1 {
            color: #00ffff;
            font-size: 24px;
        }

        .btn-sair {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid #ff4444;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(10, 10, 26, 0.9);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            color: #00ffff;
        }

        .stat-card .label {
            color: #888;
            font-size: 12px;
            margin-top: 5px;
        }

        .btn-criar {
            background: linear-gradient(135deg, #00aaff, #0066cc);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 25px;
            font-weight: bold;
            font-size: 14px;
        }

        .filtros {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filtro-btn {
            padding: 8px 20px;
            background: rgba(30, 30, 50, 0.8);
            border: 1px solid #333;
            border-radius: 25px;
            color: #ccc;
            cursor: pointer;
        }

        .filtro-btn.active {
            background: #00aaff;
            color: white;
        }

        .caso-card {
            background: rgba(10, 10, 26, 0.9);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            transition: 0.3s;
        }

        .caso-card:hover {
            transform: translateX(5px);
            border-left-color: #00ffff;
            border-left-width: 3px;
        }

        .caso-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .caso-titulo {
            color: #00ffff;
            font-size: 18px;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .status-em_andamento {
            background: rgba(255, 170, 0, 0.2);
            color: #ffaa00;
        }

        .status-concluido {
            background: rgba(0, 255, 0, 0.2);
            color: #00ff00;
        }

        .prioridade-alta {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 11px;
        }

        .caso-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 15px 0;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }

        .caso-acoes {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-concluir {
            background: rgba(0, 255, 0, 0.2);
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .empty {
            text-align: center;
            padding: 60px;
            color: #666;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
            }
            .logo-sidebar h2, .nav-item span:last-child {
                display: none;
            }
            .main-content {
                margin-left: 70px;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-sidebar">
            <img src="/static/logo.png" alt="SPYNET">
            <h2>SPYNET</h2>
        </div>
        <div class="nav-item" onclick="window.location.href='/dashboard'">
            <span>🏠</span>
            <span>Dashboard</span>
        </div>
        <div class="nav-item" onclick="window.location.href='/sentinel'">
            <span>🛡️</span>
            <span>Sentinel Monitor</span>
        </div>
        <div class="nav-item" onclick="window.location.href='/osint'">
            <span>🔍</span>
            <span>OSINT IA</span>
        </div>
        <div class="nav-item active" onclick="window.location.href='/casos'">
            <span>📋</span>
            <span>Casos</span>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Casos Investigativos</h1>
            <button class="btn-sair" onclick="window.location.href='/sair'">Sair</button>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="value" id="totalCasos">0</div>
                <div class="label">Total de Casos</div>
            </div>
            <div class="stat-card">
                <div class="value" id="casosAndamento">0</div>
                <div class="label">Em Andamento</div>
            </div>
            <div class="stat-card">
                <div class="value" id="casosConcluidos">0</div>
                <div class="label">Concluídos</div>
            </div>
            <div class="stat-card">
                <div class="value" id="alertasPrioridade">0</div>
                <div class="label">Prioridade Alta</div>
            </div>
        </div>

        <button class="btn-criar" onclick="abrirModalCriarCaso()">+ NOVO CASO INVESTIGATIVO</button>

        <div class="filtros">
            <button class="filtro-btn active" data-filtro="todos">📋 Todos</button>
            <button class="filtro-btn" data-filtro="em_andamento">⚡ Em Andamento</button>
            <button class="filtro-btn" data-filtro="concluido">✅ Concluídos</button>
            <button class="filtro-btn" data-filtro="alta">🚨 Prioridade Alta</button>
        </div>

        <div id="listaCasos"></div>
    </div>

    <script>
        let casos = [];
        let filtroAtual = 'todos';

        async function carregarCasos() {
            try {
                const response = await fetch('/api/casos/listar');
                casos = await response.json();
                atualizarLista();
                atualizarEstatisticas();
            } catch(e) {
                console.error('Erro ao carregar casos:', e);
            }
        }

        async function atualizarEstatisticas() {
            try {
                const response = await fetch('/api/estatisticas');
                const data = await response.json();
                document.getElementById('totalCasos').textContent = data.total;
                document.getElementById('casosAndamento').textContent = data.em_andamento;
                document.getElementById('casosConcluidos').textContent = data.concluidos;
                document.getElementById('alertasPrioridade').textContent = data.prioridade_alta;
            } catch(e) {}
        }

        function atualizarLista() {
            let casosFiltrados = casos;
            
            if(filtroAtual === 'em_andamento') {
                casosFiltrados = casos.filter(c => c.status === 'em_andamento');
            } else if(filtroAtual === 'concluido') {
                casosFiltrados = casos.filter(c => c.status === 'concluido');
            } else if(filtroAtual === 'alta') {
                casosFiltrados = casos.filter(c => c.prioridade === 'alta');
            }
            
            const container = document.getElementById('listaCasos');
            
            if(casosFiltrados.length === 0) {
                container.innerHTML = '<div class="empty">📋 Nenhum caso encontrado. Clique em "NOVO CASO" para começar.</div>';
                return;
            }
            
            container.innerHTML = casosFiltrados.map(caso => `
                <div class="caso-card">
                    <div class="caso-header">
                        <div class="caso-titulo">${caso.nome}</div>
                        <div style="display: flex; gap: 10px;">
                            ${caso.prioridade === 'alta' ? '<span class="prioridade-alta">🚨 Prioridade Alta</span>' : ''}
                            <span class="status-badge status-${caso.status}">${caso.status === 'em_andamento' ? 'Em Andamento' : 'Concluído'}</span>
                        </div>
                    </div>
                    <div class="caso-info">
                        <div>📝 ${caso.descricao || 'Sem descrição'}</div>
                        <div>👤 Vítima: ${caso.vítima || 'Não informada'}</div>
                        <div>👁️ Agressor: ${caso.agressor || 'Não informado'}</div>
                        <div>📅 Criado em: ${caso.data_criacao}</div>
                    </div>
                    ${caso.status === 'em_andamento' ? `
                        <div class="caso-acoes">
                            <button class="btn-concluir" onclick="concluirCaso(${caso.id})">✅ Concluir Caso</button>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        function abrirModalCriarCaso() {
            const nome = prompt('📋 Título do caso:');
            if(!nome) return;
            
            const descricao = prompt('📝 Descrição do caso:');
            const vitima = prompt('👤 Nome da vítima (se aplicável):');
            const agressor = prompt('👁️ Nome do agressor/suspeito:');
            const prioridade = prompt('🚨 Prioridade (baixa/media/alta):', 'media');
            
            fetch('/api/casos/criar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    nome: nome,
                    descricao: descricao || 'Sem descrição',
                    vitima: vitima || 'Não informada',
                    agressor: agressor || 'Não informado',
                    prioridade: prioridade === 'alta' ? 'alta' : (prioridade === 'baixa' ? 'baixa' : 'media'),
                    tipo: 'violencia'
                })
            }).then(() => {
                carregarCasos();
            });
        }

        async function concluirCaso(id) {
            await fetch(`/api/casos/atualizar/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'concluido' })
            });
            carregarCasos();
        }

        document.querySelectorAll('.filtro-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                filtroAtual = btn.dataset.filtro;
                atualizarLista();
            });
        });

        carregarCasos();
        setInterval(atualizarEstatisticas, 5000);
    </script>
</body>
</html>
