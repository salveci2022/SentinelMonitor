<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SPYNET - Login</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <link rel="shortcut icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .login-container {
            background: rgba(10, 10, 20, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 32px 24px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 255, 255, 0.2);
            text-align: center;
        }

        .logo {
            width: min(130px, 35vw);
            height: min(130px, 35vw);
            margin: 0 auto 16px;
            display: block;
            border-radius: 24px;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.4);
            object-fit: contain;
            background: #0a0a1a;
            padding: 12px;
        }

        .logo-text h1 {
            color: #00ffff;
            font-size: clamp(24px, 7vw, 34px);
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            font-weight: 700;
        }

        .logo-text p {
            color: #888;
            font-size: clamp(10px, 3vw, 12px);
            letter-spacing: 2px;
            margin-bottom: 28px;
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #00ffff;
            font-size: clamp(11px, 3.5vw, 13px);
            font-weight: 600;
            letter-spacing: 1px;
        }

        .input-group input {
            width: 100%;
            padding: clamp(12px, 4vw, 15px);
            background: rgba(20, 20, 40, 0.8);
            border: 1px solid #333;
            border-radius: 14px;
            font-size: clamp(14px, 4vw, 16px);
            color: #fff;
            transition: 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.3);
        }

        button {
            width: 100%;
            padding: clamp(14px, 4.5vw, 16px);
            background: linear-gradient(135deg, #00aaff, #0066cc);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: clamp(14px, 4.5vw, 18px);
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 12px;
        }

        button:active {
            transform: scale(0.97);
        }

        .error {
            color: #ff4444;
            margin-top: 16px;
            font-size: clamp(12px, 3.5vw, 14px);
        }

        .version {
            margin-top: 24px;
            color: #444;
            font-size: clamp(9px, 3vw, 11px);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="SPYNET" class="logo">
        
        <div class="logo-text">
            <h1>SPYNET</h1>
            <p>SEGURANÇA INTELIGENTE</p>
        </div>

        <form action="/fazer_login" method="POST">
            <div class="input-group">
                <label>USUÁRIO</label>
                <input type="text" name="username" placeholder="Digite seu usuário" required autocomplete="off">
            </div>
            <div class="input-group">
                <label>SENHA</label>
                <input type="password" name="password" placeholder="Digite sua senha" required>
            </div>
            <button type="submit">ACESSAR</button>
            {% if erro %}
                <div class="error">{{ erro }}</div>
            {% endif %}
        </form>
        <div class="version">SentinelMonitor v1.0</div>
    </div>
</body>
</html>
