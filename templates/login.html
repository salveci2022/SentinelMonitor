<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SPYNET - Intelligence Platform</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link rel="shortcut icon" type="image/png" href="/static/logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .login-container {
            background: rgba(10, 10, 20, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 40px 32px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 255, 255, 0.2);
            text-align: center;
            z-index: 1;
        }

        .logo {
            width: 110px;
            height: 110px;
            margin: 0 auto 20px;
            display: block;
            border-radius: 24px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.4);
            object-fit: contain;
            background: #0a0a1a;
            padding: 12px;
        }

        .logo-text h1 {
            color: #00ffff;
            font-size: 32px;
            letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            font-weight: 700;
        }

        .logo-text p {
            color: #888;
            font-size: 11px;
            letter-spacing: 2px;
            margin-bottom: 35px;
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #00ffff;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(20, 20, 40, 0.8);
            border: 1px solid #333;
            border-radius: 12px;
            font-size: 15px;
            color: #fff;
            transition: 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.3);
        }

        .input-group input::placeholder {
            color: #555;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00aaff, #0066cc);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 15px;
        }

        button:hover {
            background: linear-gradient(135deg, #00ccff, #0088ee);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 170, 255, 0.3);
        }

        button:active {
            transform: scale(0.98);
        }

        .error {
            color: #ff4444;
            margin-top: 16px;
            font-size: 13px;
        }

        .version {
            margin-top: 28px;
            color: #444;
            font-size: 10px;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 24px;
            }
            .logo {
                width: 90px;
                height: 90px;
            }
            .logo-text h1 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="/static/logo.png" alt="SPYNET" class="logo" 
             onerror="this.src='https://placehold.co/100x100/0a0a1a/00ffff?text=SN'">
        
        <div class="logo-text">
            <h1>SPYNET</h1>
            <p>SEGURANÇA INTELIGENTE</p>
        </div>

        <form action="/fazer_login" method="POST">
            <div class="input-group">
                <label>USUÁRIO</label>
                <input type="text" name="username" placeholder="Digite seu usuário" required autocomplete="off">
            </div>
            <div class="input-group">
                <label>SENHA</label>
                <input type="password" name="password" placeholder="Digite sua senha" required>
            </div>
            <button type="submit">ACESSAR SISTEMA</button>
            {% if erro %}
                <div class="error">{{ erro }}</div>
            {% endif %}
        </form>
        <div class="version">SPYNET Intelligence v2.0 | Monitoramento & OSINT</div>
    </div>
</body>
</html>
