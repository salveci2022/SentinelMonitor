<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPYNET - Login</title>
    <!-- FAVICON DO ATALHO - CORRIGIDO -->
    <link rel="icon" type="image/png" href="/static/logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e, #16213e);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Efeito de fundo com grid */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .login-container {
            background: rgba(10, 10, 20, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5),
                        0 0 0 1px rgba(0, 255, 255, 0.2);
            text-align: center;
            z-index: 1;
        }

        /* SEU LOGO AQUI - CORRIGIDO */
        .logo {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            display: block;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .logo-text h1 {
            color: #00ffff;
            font-size: 28px;
            letter-spacing: 4px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            font-weight: 700;
        }

        .logo-text p {
            color: #888;
            font-size: 11px;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #00ffff;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(20, 20, 40, 0.8);
            border: 1px solid #333;
            border-radius: 10px;
            font-size: 14px;
            color: #fff;
            transition: 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            background: rgba(20, 20, 40, 1);
        }

        .input-group input::placeholder {
            color: #555;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00aaff, #0066cc);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        button:hover {
            background: linear-gradient(135deg, #00ccff, #0088ee);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 170, 255, 0.3);
        }

        .error {
            color: #ff4444;
            margin-top: 15px;
            font-size: 13px;
        }

        .version {
            margin-top: 20px;
            color: #555;
            font-size: 10px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- SEU LOGO NO LUGAR DO ESCUDO - CORRIGIDO -->
        <img src="/static/logo.png" alt="SPYNET" class="logo" onerror="this.src='https://via.placeholder.com/100x100?text=SPYNET'">
        
        <div class="logo-text">
            <h1>SPYNET</h1>
            <p>SEGURANÇA INTELIGENTE</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label>USUÁRIO</label>
                <input type="text" id="username" placeholder="Digite seu usuário" required autocomplete="off">
            </div>
            <div class="input-group">
                <label>SENHA</label>
                <input type="password" id="password" placeholder="Digite sua senha" required>
            </div>
            <button type="submit">ACESSAR</button>
            <div class="error" id="errorMsg"></div>
        </form>
        <div class="version">SentinelMonitor v1.0</div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Credenciais padrão (você pode mudar)
            if(username === 'admin' && password === 'admin') {
                window.location.href = '/dashboard';
            } else {
                document.getElementById('errorMsg').textContent = '❌ Usuário ou senha incorretos!';
            }
        });
    </script>
</body>
</html>
