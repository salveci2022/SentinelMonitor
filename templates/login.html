<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SPYNET - Login</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .login-container {
            background: rgba(10, 10, 20, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 32px 24px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5),
                        0 0 0 1px rgba(0, 255, 255, 0.2);
            text-align: center;
        }

        /* LOGO GRANDE E RESPONSIVO */
        .logo {
            width: min(140px, 35vw);
            height: min(140px, 35vw);
            margin: 0 auto 16px;
            display: block;
            border-radius: 24px;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.4);
            object-fit: contain;
            background: #0a0a1a;
            padding: 12px;
        }

        .logo-text h1 {
            color: #00ffff;
            font-size: clamp(24px, 8vw, 36px);
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            font-weight: 700;
        }

        .logo-text p {
            color: #888;
            font-size: clamp(10px, 3.5vw, 12px);
            letter-spacing: 1.5px;
            margin-bottom: 28px;
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #00ffff;
            font-size: clamp(11px, 3.5vw, 13px);
            font-weight: 600;
            letter-spacing: 1px;
        }

        .input-group input {
            width: 100%;
            padding: clamp(12px, 4vw, 16px) clamp(14px, 4vw, 18px);
            background: rgba(20, 20, 40, 0.8);
            border: 1px solid #333;
            border-radius: 14px;
            font-size: clamp(14px, 4vw, 16px);
            color: #fff;
            transition: 0.3s;
            -webkit-appearance: none;
            appearance: none;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.3);
            background: rgba(20, 20, 40, 1);
        }

        .input-group input::placeholder {
            color: #555;
            font-size: clamp(12px, 3.5vw, 14px);
        }

        button {
            width: 100%;
            padding: clamp(14px, 4.5vw, 18px);
            background: linear-gradient(135deg, #00aaff, #0066cc);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: clamp(14px, 4.5vw, 18px);
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 12px;
            -webkit-tap-highlight-color: transparent;
        }

        button:active {
            transform: scale(0.97);
            background: linear-gradient(135deg, #0088dd, #0055aa);
        }

        .error {
            color: #ff4444;
            margin-top: 16px;
            font-size: clamp(12px, 3.5vw, 14px);
        }

        .version {
            margin-top: 24px;
            color: #444;
            font-size: clamp(9px, 3vw, 11px);
        }

        /* Ajustes específicos para celular */
        @media (max-width: 480px) {
            .login-container {
                padding: 28px 20px;
                border-radius: 24px;
            }
            
            .logo {
                width: 110px;
                height: 110px;
                padding: 10px;
            }
        }

        @media (max-width: 360px) {
            .login-container {
                padding: 24px 16px;
            }
            
            .logo {
                width: 90px;
                height: 90px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- LOGO - TAMANHO AJUSTADO PARA CELULAR -->
        <img src="/static/logo.png" alt="SPYNET" class="logo" 
             onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Crect width=\'100\' height=\'100\' fill=\'%230a0a1a\'/%3E%3Ctext x=\'50\' y=\'55\' text-anchor=\'middle\' fill=\'%2300ffff\' font-size=\'14\' font-family=\'monospace\'%3ESPYNET%3C/text%3E%3C/svg%3E'">
        
        <div class="logo-text">
            <h1>SPYNET</h1>
            <p>SEGURANÇA INTELIGENTE</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label>USUÁRIO</label>
                <input type="text" id="username" placeholder="Digite seu usuário" required autocomplete="off">
            </div>
            <div class="input-group">
                <label>SENHA</label>
                <input type="password" id="password" placeholder="Digite sua senha" required>
            </div>
            <button type="submit">ACESSAR</button>
            <div class="error" id="errorMsg"></div>
        </form>
        <div class="version">SentinelMonitor v1.0</div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if(username === 'admin' && password === 'admin') {
                window.location.href = '/dashboard';
            } else {
                document.getElementById('errorMsg').textContent = '❌ Usuário ou senha incorretos!';
            }
        });

        // Aumentar tamanho do toque no celular
        const buttons = document.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.addEventListener('touchstart', function() {
                this.style.transform = 'scale(0.97)';
            });
            btn.addEventListener('touchend', function() {
                this.style.transform = '';
            });
        });
    </script>
</body>
</html>
