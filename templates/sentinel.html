<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPYNET - Sentinel Monitor</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100%;
            background: linear-gradient(180deg, #0a0a1a 0%, #0d0d1a 100%);
            border-right: 1px solid rgba(0, 255, 255, 0.2);
            padding: 20px 0;
        }

        .logo-sidebar {
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            margin-bottom: 20px;
        }

        .logo-sidebar img {
            width: 60px;
            height: 60px;
            border-radius: 12px;
        }

        .logo-sidebar h2 {
            color: #00ffff;
            font-size: 18px;
        }

        .nav-item {
            padding: 12px 24px;
            color: #ccc;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background: rgba(0, 255, 255, 0.1);
            color: #00ffff;
        }

        .nav-item.active {
            background: rgba(0, 255, 255, 0.15);
            border-left-color: #00ffff;
            color: #00ffff;
        }

        .main-content {
            margin-left: 260px;
            padding: 20px;
        }

        .header {
            background: rgba(10, 10, 26, 0.9);
            border-radius: 15px;
            padding: 15px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        .header h1 {
            color: #00ffff;
        }

        .btn-sair {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid #ff4444;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .status-card {
            background: rgba(10, 10, 26, 0.9);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        .status-text {
            font-size: 24px;
            font-weight: bold;
            color: #ff4444;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-start {
            background: #00aa44;
            color: white;
        }

        .btn-stop {
            background: #ff4444;
            color: white;
        }

        .btn-clear {
            background: #ffaa00;
            color: #1a1a2e;
        }

        .section {
            background: rgba(10, 10, 26, 0.9);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        .section h3 {
            color: #00ffff;
            margin-bottom: 15px;
        }

        .log-area {
            background: #0a0a0a;
            border-radius: 10px;
            padding: 15px;
            color: #00ff00;
            font-family: monospace;
            height: 150px;
            overflow-y: auto;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
            }
            .logo-sidebar h2, .nav-item span:last-child {
                display: none;
            }
            .main-content {
                margin-left: 70px;
            }
            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-sidebar">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="SPYNET">
            <h2>SPYNET</h2>
        </div>
        <div class="nav-item" onclick="window.location.href='/dashboard'">
            <span>🏠</span>
            <span>Dashboard</span>
        </div>
        <div class="nav-item active" onclick="window.location.href='/sentinel'">
            <span>🛡️</span>
            <span>Sentinel Monitor</span>
        </div>
        <div class="nav-item" onclick="window.location.href='/osint'">
            <span>🔍</span>
            <span>OSINT</span>
        </div>
        <div class="nav-item" onclick="window.location.href='/casos'">
            <span>📋</span>
            <span>Casos</span>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Sentinel Monitor</h1>
            <button class="btn-sair" onclick="window.location.href='/sair'">Sair</button>
        </div>

        <div class="status-card">
            <div class="status-text" id="statusText">⚫ PARADO</div>
        </div>

        <div class="button-group">
            <button class="btn btn-start" id="btnIniciar">▶ INICIAR</button>
            <button class="btn btn-stop" id="btnParar">⏹️ PARAR</button>
            <button class="btn btn-clear" id="btnLimpar">🗑️ LIMPAR</button>
        </div>

        <div class="section">
            <h3>📸 Screenshots</h3>
            <div class="log-area" id="screenshots">Nenhuma screenshot</div>
        </div>

        <div class="section">
            <h3>🎙️ Áudios</h3>
            <div class="log-area" id="audios">Nenhum áudio</div>
        </div>

        <div class="section">
            <h3>⌨️ Teclas Digitadas</h3>
            <div class="log-area" id="teclas">Nenhuma tecla</div>
        </div>
    </div>

    <script>
        let ativo = false;
        const statusText = document.getElementById('statusText');
        
        document.getElementById('btnIniciar').onclick = () => {
            ativo = true;
            statusText.innerHTML = '🟢 MONITORANDO';
            statusText.style.color = '#00ff00';
        };
        
        document.getElementById('btnParar').onclick = () => {
            ativo = false;
            statusText.innerHTML = '🔴 PARADO';
            statusText.style.color = '#ff4444';
        };
        
        document.getElementById('btnLimpar').onclick = () => {
            document.getElementById('screenshots').innerHTML = 'Nenhuma screenshot';
            document.getElementById('audios').innerHTML = 'Nenhum áudio';
            document.getElementById('teclas').innerHTML = 'Nenhuma tecla';
        };
    </script>
</body>
</html>
