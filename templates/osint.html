<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPYNET - OSINT</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100%;
            background: linear-gradient(180deg, #0a0a1a 0%, #0d0d1a 100%);
            border-right: 1px solid rgba(0, 255, 255, 0.2);
            padding: 20px 0;
        }

        .logo-sidebar {
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            margin-bottom: 20px;
        }

        .logo-sidebar img {
            width: 60px;
            height: 60px;
            border-radius: 12px;
        }

        .logo-sidebar h2 {
            color: #00ffff;
            font-size: 18px;
        }

        .nav-item {
            padding: 12px 24px;
            color: #ccc;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background: rgba(0, 255, 255, 0.1);
            color: #00ffff;
        }

        .nav-item.active {
            background: rgba(0, 255, 255, 0.15);
            border-left-color: #00ffff;
            color: #00ffff;
        }

        .main-content {
            margin-left: 260px;
            padding: 20px;
        }

        .header {
            background: rgba(10, 10, 26, 0.9);
            border-radius: 15px;
            padding: 15px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        .header h1 {
            color: #00ffff;
        }

        .btn-sair {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid #ff4444;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 12px;
            background: rgba(20, 20, 40, 0.8);
            border: 1px solid #333;
            border-radius: 10px;
            color: white;
        }

        .search-box button {
            padding: 12px 25px;
            background: #00aaff;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .tool-card {
            background: rgba(10, 10, 26, 0.9);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        .tool-card h4 {
            color: #00ffff;
        }

        .tool-card a {
            color: #0af;
            text-decoration: none;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
            }
            .logo-sidebar h2, .nav-item span:last-child {
                display: none;
            }
            .main-content {
                margin-left: 70px;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-sidebar">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="SPYNET">
            <h2>SPYNET</h2>
        </div>
        <div class="nav-item" onclick="window.location.href='/dashboard'">
            <span>🏠</span>
            <span>Dashboard</span>
        </div>
        <div class="nav-item" onclick="window.location.href='/sentinel'">
            <span>🛡️</span>
            <span>Sentinel Monitor</span>
        </div>
        <div class="nav-item active" onclick="window.location.href='/osint'">
            <span>🔍</span>
            <span>OSINT</span>
        </div>
        <div class="nav-item" onclick="window.location.href='/casos'">
            <span>📋</span>
            <span>Casos</span>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>OSINT Intelligence</h1>
            <button class="btn-sair" onclick="window.location.href='/sair'">Sair</button>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Digite nome, e-mail, telefone...">
            <button onclick="buscar()">🔍 Buscar</button>
        </div>

        <div class="tools-grid">
            <div class="tool-card"><h4>🌐 Google</h4><a href="https://www.google.com" target="_blank">Acessar</a></div>
            <div class="tool-card"><h4>📘 Facebook</h4><a href="https://www.facebook.com" target="_blank">Acessar</a></div>
            <div class="tool-card"><h4>📷 Instagram</h4><a href="https://www.instagram.com" target="_blank">Acessar</a></div>
            <div class="tool-card"><h4>🐦 Twitter</h4><a href="https://twitter.com" target="_blank">Acessar</a></div>
            <div class="tool-card"><h4>💼 LinkedIn</h4><a href="https://www.linkedin.com" target="_blank">Acessar</a></div>
            <div class="tool-card"><h4>🐙 GitHub</h4><a href="https://github.com" target="_blank">Acessar</a></div>
            <div class="tool-card"><h4>🔐 HaveIBeenPwned</h4><a href="https://haveibeenpwned.com" target="_blank">Acessar</a></div>
            <div class="tool-card"><h4>📜 JusBrasil</h4><a href="https://www.jusbrasil.com.br" target="_blank">Acessar</a></div>
        </div>
    </div>

    <script>
        function buscar() {
            const query = document.getElementById('searchInput').value;
            if(query) {
                window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}`, '_blank');
            }
        }
    </script>
</body>
</html>
